<!DOCTYPE html>
<html>
<head>
    <title>Data Center Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
        }
        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }
        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .status {
            font-size: 18px;
            margin-top: 10px;
        }
        .up { color: #22c55e; }
        .down { color: #ef4444; }
    </style>
</head>
<body>

<header>Data Center Monitoring Dashboard</header>

<div class="container">
    <div class="card">
        <h3>Server 1</h3>
        <div class="status up">Status: Running</div>
        <p>CPU: 45%</p>
        <p>Memory: 60%</p>
    </div>

    <div class="card">
        <h3>Server 2</h3>
        <div class="status up">Status: Running</div>
        <p>CPU: 35%</p>
        <p>Memory: 50%</p>
    </div>

    <div class="card">
        <h3>Server 3</h3>
        <div class="status down">Status: Down</div>
        <p>CPU: N/A</p>
        <p>Memory: N/A</p>
    </div>
</div>

</body>
</html>
