apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
  labels:
    app: react-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app

    spec:
      containers:
        - name: react-container
          image: acravi5.azurecr.io/birthday-app:v1   # 👈 ACR image acravi5.azurecr.io/birthday-app:v1
          ports:
            - containerPort: 80